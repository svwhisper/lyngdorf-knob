name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build + merge firmware with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.3
          target: esp32s3
          path: '.'
          # idf.py merge-bin runs INSIDE the IDF container where esptool
          # is on PATH; running esptool in a separate later step fails
          # because it isn't installed on the system Python.
          command: idf.py build && idf.py merge-bin -o build/lyngdorf-knob-merged.bin

      - name: Update manifest version
        run: |
          # Sync version in docs/manifest.json with the pushed tag (vX.Y.Z → X.Y.Z)
          VER="${GITHUB_REF#refs/tags/v}"
          sed -i 's|"version": "[^"]*"|"version": "'"$VER"'"|' docs/manifest.json
          sed -i 's|releases/download/v[^/]*/|releases/download/v'"$VER"'/|' docs/manifest.json
          cat docs/manifest.json

      - name: Commit manifest update back to main
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/manifest.json
          git commit -m "Bump manifest to ${GITHUB_REF#refs/tags/}" || echo "no changes"
          git push origin HEAD:main || echo "push skipped"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/lyngdorf-knob-merged.bin
            build/lyngdorf-knob.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          generate_release_notes: true
